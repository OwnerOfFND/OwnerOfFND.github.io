<!DOCTYPE html>
<html>
<head>
<title>FND Values</title>
<style>
body { background:#0a0a0a; color:white; font-family:Arial; }
.container { display:flex; flex-wrap:wrap; gap:20px; padding:20px; }
.card { width:300px; border:2px solid #ff00ff; border-radius:12px; padding:15px; background:#111; }
.title { font-size:20px; color:#ff66ff; }
.exists { background:#00e5ff; padding:5px 10px; border-radius:6px; display:inline-block; margin-top:5px; }
.stat { margin-top:10px; }
input { width:100%; padding:10px; background:#111; border:1px solid #333; color:white; }
</style>
</head>

<body>

<h1 style="padding:20px;">FND CENTRAL</h1>

<div style="padding:20px;">
<input id="search" placeholder="Search unit...">
</div>

<div class="container" id="units"></div>

<script>
let units = {
  "Nightmare Fredbear": {
    exists: 120,
    value: "???",
    demand: 9,
    status: "Stable",
    image: "nightmare_fredbear.png"
}
    "Shiny Astral Bonnie": { exists:4, value:"N/A", demand:10, status:"Stable" },
    "Dragon Endo 01": { exists:4770, value:"10K-15K", demand:8, status:"Unstable" }
};

function render(data){
    const container = document.getElementById("units");
    container.innerHTML = "";

    Object.entries(data).forEach(([name, unit])=>{
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <div class="title">${name}</div>
        <div class="exists">${unit.exists} EXISTS</div>
        <div class="stat">Value: ${unit.value}</div>
        <div class="stat">Demand: ${unit.demand}/10</div>
        <div class="stat">Status: ${unit.status}</div>
        `;

        container.appendChild(div);
    });
}

render(units);

document.getElementById("search").addEventListener("input", e=>{
    let val = e.target.value.toLowerCase();

    let filtered = Object.fromEntries(
        Object.entries(units).filter(([name]) =>
            name.toLowerCase().includes(val)
        )
    );

    render(filtered);
});
</script>

</body>
</html>
